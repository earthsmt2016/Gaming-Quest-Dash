kind = "web"
previewPath = "/"
title = "Gaming Quest Dashboard"
version = "1.0.0"
id = "artifacts/gaming-quest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23811

[services.development]
run = "pnpm --filter @workspace/gaming-quest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gaming-quest", "run", "build" ]
publicDir = "artifacts/gaming-quest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23811"
BASE_PATH = "/"
